<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Run</title>
    <meta name="description" content="Field Run — Trace. Capture. Dominate.">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

    <!-- ══════════════════════════════
         CARTE (fond)
    ══════════════════════════════ -->
    <div id="map"></div>

    <!-- ══════════════════════════════
         LOADER GPS
    ══════════════════════════════ -->
    <div id="loader">
        <div id="loaderRing"></div>
        <img src="assets/images/logo_nobg.png" id="loaderLogo" alt="Field Run">
        <p id="loaderText">Acquisition GPS…</p>
    </div>

    <!-- ══════════════════════════════
         HUD — BARRE HAUTE
    ══════════════════════════════ -->
    <div id="topBar">

        <!-- Profil joueur -->
        <div id="profileChip">
            <div id="profileAvatar">
                <div id="profileHead"></div>
                <div id="profileBody"></div>
            </div>
            <div id="profileInfos">
                <span id="playerName">Player</span>
                <span id="playerArea">0 m²</span>
            </div>
        </div>

        <!-- Argent -->
        <div id="moneyChip">
            <span id="moneyCoin">◈</span>
            <span id="moneyText">0</span>
        </div>

        <!-- Boutons icônes -->
        <div id="topActions">
            <button class="topBtn" id="BtnShop" title="Boutique">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            </button>
            <button class="topBtn" id="BtnMenu" title="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>

    </div>

    <!-- ══════════════════════════════
         HUD — MENU DROIT
    ══════════════════════════════ -->
    <nav id="rightMenu">

        <button class="sideBtn" id="BtnFriends" title="Amis">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span class="sideBtnLabel">Amis</span>
        </button>

        <button class="sideBtn" id="BtnLeague" title="Classement">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 20 18 10"/><polyline points="12 20 12 4"/><polyline points="6 20 6 14"/></svg>
            <span class="sideBtnLabel">Classement</span>
        </button>

        <button class="sideBtn" id="BtnClub" title="Club">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span class="sideBtnLabel">Club</span>
        </button>

    </nav>

    <!-- ══════════════════════════════
         HUD — DAILY STREAK
    ══════════════════════════════ -->
    <div id="dailyStreak">
        <div id="dailyIcon">🔥</div>
        <div id="dailyInfos">
            <span id="dailyLabel">Daily Streak</span>
            <span id="dailyCount">3 jours</span>
        </div>
        <div id="dailyBadge">+50</div>
    </div>

    <!-- ══════════════════════════════
         HUD — BOUTON RECENTRER
    ══════════════════════════════ -->
    <button id="BtnCenter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
    </button>

    <!-- ══════════════════════════════
         HUD — BARRE BAS (RUN / STOP / XP)
    ══════════════════════════════ -->
    <div id="bottomBar">

        <!-- Bouton XP (gauche) -->
        <button id="BtnXp">
            <img src="assets/images/XP_nobg.png" alt="XP" id="ImgXp">
            <div id="xpGlow"></div>
        </button>

        <!-- Bouton RUN -->
        <button id="BtnStart">
            <span id="BtnStartInner">
                <svg class="runIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                RUN
            </span>
            <div class="btnPulse"></div>
        </button>

        <!-- Bouton STOP -->
        <button id="BtnStop">
            <span id="BtnStopInner">
                <svg class="runIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                STOP
            </span>
        </button>

        <!-- Mode de jeu (droite) -->
        <button id="BtnMode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M4.93 4.93a10 10 0 000 14.14"/></svg>
            <span id="modeLabel">Solo</span>
        </button>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
